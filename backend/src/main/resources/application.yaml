spring:
  application:
    name: "alertbridge"
  datasource:
    url: "jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:alertbridge}"
    username: ${POSTGRES_USER:dev}
    password: ${POSTGRES_PASSWORD:dev}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
