services:

  postgres:
    container_name: postgres
    image: postgres:18-alpine
    ports:
        - "5432:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: alerts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d alerts"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    container_name: redis
    image: redis:8.2.3-alpine
    ports:
        - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
