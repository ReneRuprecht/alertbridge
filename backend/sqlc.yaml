version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/platform/postgres_db/query.sql"
    schema: "internal/platform/postgres_db/schema.sql"
    gen:
      go:
        package: "postgres_db"
        out: "internal/platform/postgres_db"
        sql_package: "pgx/v5"
        overrides:
          - column: "alerts.starts_at"
            go_type:
              type: "time.Time"
          - column: "alerts.received_at"
            go_type:
              type: "time.Time"
          - column: "alerts.resolved_at"
            go_type:
              type: "time.Time"
          - column: "alerts.labels"
            go_type:
              type: "map[string]string"
          - column: "alerts.annotations"
            go_type:
               type: "map[string]string"
