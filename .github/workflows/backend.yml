name: Go Backend

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: homelab
    container:
      image: reneruprecht/ci-golang126:latest

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        working-directory: ./backend
        run: go mod tidy

      - name: Build
        working-directory: ./backend
        run: go build ./...

      - name: Run unit tests
        working-directory: ./backend
        run: go test ./... -v

      - name: Run integration tests
        working-directory: ./backend
        run: go test -tags=integration ./... -v
